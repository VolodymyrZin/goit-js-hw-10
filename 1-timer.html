<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <!-- <link rel="stylesheet" href="iziToast.min.css" /> -->
    <script type="module" crossorigin src="/goit-js-hw-10/1-timer.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/vendor-BZoxUzx5.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/vendor-DRAOUfWK.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/styles-Dpg8iU_p.css">
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="main-title">Timer</h1>
        <a class="back-link" href="./index.html">Go back</a>
      </div>
      <div class="picker">
        <div class="date-time-input">
          <input type="text" id="datetime-picker" />
          <button class="button" type="button" data-start>Start</button>
        </div>

        <div class="timer">
          <div class="field">
            <span class="value" data-days>00</span>
            <span class="label">Days</span>
          </div>
          <div class="field">
            <span class="value" data-hours>00</span>
            <span class="label">Hours</span>
          </div>
          <div class="field">
            <span class="value" data-minutes>00</span>
            <span class="label">Minutes</span>
          </div>
          <div class="field">
            <span class="value" data-seconds>00</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      </div>
    </main>
    <!-- <script src="iziToast.min.js" type="text/javascript"></script> -->
  </body>
</html>
